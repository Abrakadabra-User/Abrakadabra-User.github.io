{{ define "main" }}
<section class="pt-8 pb-12 bg-bg dark:bg-bg" data-animate>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <h1 class="text-3xl font-bold text-center mb-12 font-heading text-text-primary dark:text-text-primary">{{ .Title }}</h1>
    <div class="prose prose-lg markdown-content dark:prose-invert prose-gray max-w-none mx-auto">
      {{ .Content }}
    </div>
  </div>
</section>
{{ end }}
