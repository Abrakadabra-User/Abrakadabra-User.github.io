# Hugo Site Configuration
baseURL = "https://Abrakadabra-User.github.io/"
languageCode = "en-us"
title = "Fu Zhanbo"
theme = "careercanvas"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    contentDir = "content/en"
    languageName = "English"
    weight = 1
    [languages.en.params]
      tagline = "CS Undergraduate | Exploring Computer Vision, Large Models & Embodied AI"
        hero_description = "I am an undergraduate student majoring in Computer Science and Technology. I have a solid programming foundation and actively engage in academic research. Recently, I published a first-author paper in the JCR Q1 journal Remote Sensing regarding visual enhancement (the SARM framework). My current research interests span Computer Vision, Multimodal Large Models, and Embodied AI, and I am eager to further explore intelligent perception in my graduate studies."
        hero_location = "Wuhan, China"
        resume_url = "/files/Fu_Zhanbo_CV_EN.pdf" 
        collab_tags = [
          "Computer Vision (CV)",
          "Large Models & Multimodal",
          "Embodied AI",
          "Algorithm Implementation",
          "Mathematical Modeling"
      ]

  [languages.zh-cn]
    contentDir = "content/zh-cn"
    languageName = "中文"
    weight = 2
    [languages.zh-cn.params]
      tagline = "计算机科学与技术本科生 | 探索计算机视觉、大模型与具身智能"
        hero_description = "我是一名计算机科学与技术专业的本科生。我具备扎实的数理与编程基础，并积极投入科研实践。近期，我以第一作者身份在 JCR Q1 区期刊《Remote Sensing》上发表了视觉增强相关的研究成果（SARM 框架）。目前，我的研究兴趣主要集中在计算机视觉、多模态大模型以及具身智能等交叉领域，期待在研究生阶段进行更深入的探索。"
        hero_location = "中国, 武汉"
        resume_url = "/files/Fu_Zhanbo_CV_CN.pdf" 
        collab_tags = [
          "计算机视觉 (CV)",
          "大模型与多模态",
          "具身智能 (Embodied AI)",
          "算法实现",
          "数学建模"  
      ]

[build]
  writeStats = true

[params]
name = "Fu Zhanbo"
firstName = "Zhanbo"
lastName = "Fu"

email = "fuzhanbo@cug.edu.cn" 
profile_image = "/images/profile.jpg" 
author = "Fu Zhanbo"

og_image = "images/og-image.png"

description = "CS Undergraduate Student exploring Computer Vision, Large Models, and Embodied AI."


# 已经替换为你真实的 GitHub 仓库地址
github_url = "https://github.com/Abrakadabra-User"
github_text = "github.com/Abrakadabra-User"


copyright = "Fu Zhanbo"

# 指向你稍早前放入的个人简历文件
resume_url_en = "/files/Fu_Zhanbo_CV_EN.pdf"
resume_url_zh = "/files/Fu_Zhanbo_CV_CN.pdf"
resume_label = "View CV"

formspreeendpoint = ""
pexelsapikey = ""



[[params.social]]
icon = "github"
url = "https://github.com/Abrakadabra-User"

sectionPagesMenu = 'main'

[taxonomies]
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

[server]
  [[server.headers]]
    for = "/**/*.css"
    [server.headers.values]
      Content-Type = "text/css"

